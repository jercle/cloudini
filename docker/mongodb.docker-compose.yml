services:

  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: automonadm
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PWD}
    ports:
      - 27017:27017

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: automonadm
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_PWD}
      ME_CONFIG_MONGODB_URL: mongodb://automonadm:${MONGODB_PWD}@mongo:27017/
      ME_CONFIG_BASICAUTH: false
